[build-system]
requires = ["setuptools>=64", "wheel", "Cython>=3"]
build-backend = "setuptools.build_meta"

[project]
name = "picopie"
version = "0.1.0.dev0"
description = "A Pythonic binding for the PicoGK computational-geometry kernel"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "PicoPie contributors" }]
keywords = ["geometry", "voxels", "openvdb", "implicit", "cad", "additive-manufacturing"]
dependencies = ["numpy>=1.23"]

[project.optional-dependencies]
dev = ["pytest>=7", "pytest-timeout"]

[project.urls]
"PicoGK (upstream)" = "https://github.com/leap71/PicoGK"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
picogk = ["_native/headers/*.h", "_lib/*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
